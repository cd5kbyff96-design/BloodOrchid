syntax = "proto3";

package vailiris.shared.v1;

message StreamWindow {
  uint64 window_id = 1;
  uint64 start_tick = 2;
  uint64 end_tick = 3;
  uint32 watermark = 4;
}

message StreamCursor {
  uint64 tick = 1;
  uint64 sequence = 2;
  bytes checkpoint = 3;
}

message StreamAck {
  uint64 cursor_tick = 1;
  uint64 cursor_sequence = 2;
  bool consumed = 3;
}

message StreamControl {
  enum ControlType {
    CONTROL_TYPE_UNSPECIFIED = 0;
    CONTROL_TYPE_START = 1;
    CONTROL_TYPE_PAUSE = 2;
    CONTROL_TYPE_RESUME = 3;
    CONTROL_TYPE_STOP = 4;
  }
  ControlType type = 1;
  uint64 request_id = 2;
}