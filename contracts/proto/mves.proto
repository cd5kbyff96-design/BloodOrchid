syntax = "proto3";

package vailiris.mves.v1;

message FieldTensor {
  string field_name = 1;
  string field_kind = 2;
  uint32 width = 3;
  uint32 height = 4;
  uint32 channels = 5;
  float cell_spacing = 6;
  repeated float values = 7 [packed = true];
}

message SimulationState {
  string simulation_id = 1;
  string solver_kind = 2;
  uint64 step_index = 3;
  double simulation_time = 4;
  FieldTensor primary_field = 5;
}

message GeometryScene {
  string scene_id = 1;
  string source_simulation_id = 2;
  uint64 source_step_index = 3;
  repeated float positions = 4 [packed = true];
  repeated uint32 indices = 5 [packed = true];
  float value_min = 6;
  float value_max = 7;
}

